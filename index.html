<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Download Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .download-btn {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h1>Download Sample File</h1>
    <p>Click the button below to download a text file.</p>

    <button id="downloadButton" class="download-btn">
        Download File
    </button>

    <script>
        document.getElementById('downloadButton').addEventListener('click', () => {
            const fileContent = `Sample Download File

Generated at: ${new Date().toLocaleString()}

This file was downloaded from the demo application.
`;

            const blob = new Blob([fileContent], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement('a');
            link.href = url;
            link.download = 'sample-file.txt';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            URL.revokeObjectURL(url);
        });
    </script>

</body>
</html>
